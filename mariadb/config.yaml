---
name: MariaDB
version: 2.7.2-r1
slug: mariadb
description: MySQL-compatible SQL database server for Home Assistant
url: https://github.com/kecajtop/hassio-addons/tree/master/mariadb
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
backup_post: unlock-tables-for-backup
backup_pre: lock-tables-for-backup
image: homeassistant/{arch}-addon-mariadb
init: false
options:
  databases:
    - homeassistant
  logins:
    - username: homeassistant
      password: null
  rights:
    - username: homeassistant
      database: homeassistant
ports:
  3306/tcp: null
schema:
  databases:
    - str
  logins:
    - username: str
      password: password
  rights:
    - username: str
      database: str
      privileges:
        - str?
  mariadb_server_args:
    - str?
services:
  - mysql:provide
startup: system
timeout: 300