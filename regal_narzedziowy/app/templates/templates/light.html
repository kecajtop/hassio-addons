<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1024, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wyszukiwarka Light | Regał narzędziowy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/light.css') }}">
</head>
<body class="light-body">
    <div class="light-app">
        <header class="light-header">
            <div>
                <div class="light-badge">TRYB LIGHT</div>
                <h1>Wyszukiwarka narzędzi</h1>
                <p>Wersja bez logowania do paneli dotykowych i małych ekranów.</p>
            </div>
            <button id="theme-toggle" class="light-icon-button" type="button">🌙</button>
        </header>

        <section class="light-search-box">
            <input type="text" id="light-search-input" placeholder="Szukaj narzędzia, opisu lub regału" autocomplete="off">
            <button id="light-search-btn" type="button">Szukaj</button>
            <button id="light-clear-btn" type="button">Wyczyść</button>
        </section>

        <section class="light-main-layout">
            <article class="light-results-panel">
                <div id="light-search-status" class="light-status">Ładowanie danych...</div>
                <div id="light-search-results" class="light-results-list"></div>
            </article>

            <article class="light-rack-panel">
                <div class="light-rack-panel-header">
                    <h2 id="light-rack-title">Wybierz narzędzie</h2>
                    <div id="light-rack-subtitle" class="light-rack-subtitle">Podgląd położenia na regale</div>
                </div>
                <div class="light-canvas-wrap">
                    <canvas id="light-rack-canvas" width="420" height="320"></canvas>
                </div>
                <div id="light-tool-details" class="light-tool-details"></div>
            </article>
        </section>
    </div>

    <div id="virtual-keyboard" class="virtual-keyboard is-hidden">
        <div class="keyboard-rows">
            <div class="keyboard-row">
                <button class="key" data-key="1">1</button>
                <button class="key" data-key="2">2</button>
                <button class="key" data-key="3">3</button>
                <button class="key" data-key="4">4</button>
                <button class="key" data-key="5">5</button>
                <button class="key" data-key="6">6</button>
                <button class="key" data-key="7">7</button>
                <button class="key" data-key="8">8</button>
                <button class="key" data-key="9">9</button>
                <button class="key" data-key="0">0</button>
            </div>
            <div class="keyboard-row">
                <button class="key" data-key="q">Q</button>
                <button class="key" data-key="w">W</button>
                <button class="key" data-key="e">E</button>
                <button class="key" data-key="r">R</button>
                <button class="key" data-key="t">T</button>
                <button class="key" data-key="y">Y</button>
                <button class="key" data-key="u">U</button>
                <button class="key" data-key="i">I</button>
                <button class="key" data-key="o">O</button>
                <button class="key" data-key="p">P</button>
            </div>
            <div class="keyboard-row">
                <button class="key" data-key="a">A</button>
                <button class="key" data-key="s">S</button>
                <button class="key" data-key="d">D</button>
                <button class="key" data-key="f">F</button>
                <button class="key" data-key="g">G</button>
                <button class="key" data-key="h">H</button>
                <button class="key" data-key="j">J</button>
                <button class="key" data-key="k">K</button>
                <button class="key" data-key="l">L</button>
            </div>
            <div class="keyboard-row">
                <button class="key key-wide" data-key="Shift">Shift</button>
                <button class="key" data-key="z">Z</button>
                <button class="key" data-key="x">X</button>
                <button class="key" data-key="c">C</button>
                <button class="key" data-key="v">V</button>
                <button class="key" data-key="b">B</button>
                <button class="key" data-key="n">N</button>
                <button class="key" data-key="m">M</button>
                <button class="key key-wide" data-key="Backspace">⌫</button>
            </div>
            <div class="keyboard-row">
                <button class="key key-space" data-key=" ">Spacja</button>
                <button class="key" data-key="-">-</button>
                <button class="key" data-key=".">.</button>
                <button class="key key-enter" data-key="Enter">Enter</button>
                <button class="key key-close" type="button" data-action="close">Zamknij</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/rack_visualization.js') }}"></script>
    <script src="{{ url_for('static', filename='js/light.js') }}"></script>
</body>
</html>
